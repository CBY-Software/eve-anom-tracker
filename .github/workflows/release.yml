name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Icons
        run: npm run tauri icon app-icon.jpg

      - name: Build Tauri app
        run: npm run tauri build

      - name: Create Release and Upload Portable Executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $exePath = "src-tauri/target/release/anomtracker.exe"
          $newName = "EVE AnomTracker-Portable.exe"
          
          # Rename the raw binary to a user-friendly name
          Rename-Item -Path $exePath -NewName $newName
          
          # Create release and upload the portable exe
          gh release create $tag "src-tauri/target/release/$newName" --title "EVE AnomTracker $tag (Beta)" --notes "This is a beta version. Download the portable executable below to run the app without installation." --prerelease --clobber
